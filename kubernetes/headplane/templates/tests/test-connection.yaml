apiVersion: v1
kind: Pod
metadata:
  name: {{ include "headplane.fullname" . }}-test-connection
  labels:
    {{- include "headplane.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.37
      command: ["wget", "--spider", "--timeout=5", "http://{{ include "headplane.fullname" . }}:80/admin/healthz"]
